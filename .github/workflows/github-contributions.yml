# Refresh public GitHub contribution calendar JSON (spike / production path B).
# Requires repo secret: GH_CONTRIBUTIONS_GRAPH_TOKEN (fine-grained profile read or classic read:user).
# Cron: daily 18:00 UTC. Manual: Actions → this workflow → Run workflow.

name: Refresh GitHub contributions

on:
  schedule:
    - cron: '0 18 * * *' # daily 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-contributions
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Fetch contributions
        env:
          GH_CONTRIBUTIONS_GRAPH_TOKEN: ${{ secrets.GH_CONTRIBUTIONS_GRAPH_TOKEN }}
        run: node scripts/fetch-github-contributions.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/github-contributions.json
          if git diff --staged --quiet; then
            echo "No contribution data changes."
            exit 0
          fi
          git commit -m "chore: refresh github contribution calendar"
          git push
